name: Auto Build Release

permissions:
  contents: write
  packages: write
  discussions: write

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 建议升级到 v4 以获得更好性能

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest # 或者指定具体版本，如 1.1.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist